<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>TypeX</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header id="titlebar" class="titlebar" data-tauri-drag-region>

        <div class="titlebar__menurow" data-tauri-drag-region>
          <div class="titlebar__left">
            <button id="btn-sidebar" class="icon-btn" title="Toggle sidebar (Ctrl+\)" aria-label="Toggle sidebar">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
            </button>
            <div class="titlebar__brand">
              <span class="brand-mark"></span>
              <span class="brand-text">TypeX</span>
            </div>
            <nav id="menubar" class="menubar" aria-label="Application menu">
              <!-- menu buttons injected by menubar.ts -->
            </nav>
          </div>

          <div class="titlebar__drag" data-tauri-drag-region></div>

          <div class="titlebar__right">
            <button id="btn-palette" class="icon-btn" title="Command palette (Ctrl+K)" aria-label="Command palette">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button id="btn-theme" class="icon-btn" title="Toggle theme (Ctrl+Shift+L)" aria-label="Toggle theme">
              <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
              <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></svg>
            </button>
            <div class="titlebar__window" id="window-controls">
              <button id="win-min" class="win-btn" aria-label="Minimize"><svg viewBox="0 0 10 10" width="10" height="10"><path d="M0 5h10" stroke="currentColor" stroke-width="1"/></svg></button>
              <button id="win-max" class="win-btn" aria-label="Maximize"><svg viewBox="0 0 10 10" width="10" height="10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg></button>
              <button id="win-close" class="win-btn win-btn--close" aria-label="Close"><svg viewBox="0 0 10 10" width="10" height="10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1"/></svg></button>
            </div>
          </div>
        </div>

        <div class="titlebar__tabrow" data-tauri-drag-region>
          <div id="tab-strip" class="tabs" data-tauri-drag-region>
            <!-- tabs injected -->
          </div>
          <button id="btn-new-tab" class="icon-btn btn-new-tab" title="New document (Ctrl+N)" aria-label="New document">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>

      </header>

      <aside id="sidebar" class="sidebar">
        <nav class="sidebar__nav">
          <button class="sidebar__tab is-active" data-panel="files" title="Files"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg></button>
          <button class="sidebar__tab" data-panel="outline" title="Outline"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M8 12h12M12 18h8"/></svg></button>
          <button class="sidebar__tab" data-panel="tags" title="Tags"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11 11 5h7v7l-6 6a2 2 0 0 1-2.8 0L5 13.8a2 2 0 0 1 0-2.8Z"/><circle cx="14.5" cy="9.5" r="1.2"/></svg></button>
          <button class="sidebar__tab" data-panel="backlinks" title="Backlinks"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5"/></svg></button>
          <button class="sidebar__tab" data-panel="properties" title="Properties"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h12"/></svg></button>
        </nav>
        <div class="sidebar__content">
          <div class="panel panel--files is-active" data-panel="files">
            <div class="panel__header">
              <span class="panel__title" id="files-title">Files</span>
              <div class="panel__actions">
                <button id="btn-new-file" class="icon-btn icon-btn--sm" title="New document (Ctrl+N)" aria-label="New document">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 2v6h6"/><path d="M12 12v6M9 15h6"/></svg>
                </button>
                <button id="btn-open-file-sidebar" class="icon-btn icon-btn--sm" title="Open file (Ctrl+O)" aria-label="Open file">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 2v6h6"/></svg>
                </button>
                <button id="btn-open-folder" class="icon-btn icon-btn--sm" title="Add folder to workspace (Ctrl+Shift+O)" aria-label="Add folder to workspace">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M12 12v6M9 15h6"/></svg>
                </button>
                <button id="btn-recent-folders" class="icon-btn icon-btn--sm" title="Recent folders" aria-label="Recent folders">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                </button>
              </div>
            </div>
            <div id="file-tree" class="file-tree"></div>
          </div>
          <div class="panel panel--outline" data-panel="outline">
            <div class="panel__header"><span class="panel__title">Outline</span></div>
            <div id="outline" class="outline"></div>
          </div>
          <div class="panel panel--tags" data-panel="tags">
            <div class="panel__header"><span class="panel__title">Tags</span></div>
            <div id="tags" class="tags-panel"></div>
          </div>
          <div class="panel panel--backlinks" data-panel="backlinks">
            <div class="panel__header"><span class="panel__title">Backlinks</span></div>
            <div id="backlinks" class="backlinks-panel"></div>
          </div>
          <div class="panel panel--properties" data-panel="properties">
            <div class="panel__header"><span class="panel__title">Properties</span></div>
            <div id="properties" class="properties-panel"></div>
          </div>
        </div>
      </aside>

      <main id="workspace" class="workspace">
        <div id="editor-panes" class="editor-panes" data-view-mode="wysiwyg">
          <!-- Split-mode layout: raw on the left, WYSIWYG preview on the right. -->
          <div id="raw-host" class="raw-host">
            <div id="git-gutter" class="git-gutter" hidden aria-hidden="true"></div>
            <!-- wrap="off" keeps visual-row-N aligned to source-line-N so the git gutter marks line up. Long paragraphs scroll horizontally. -->
            <textarea id="raw-editor" class="raw-editor" spellcheck="false" wrap="off" aria-label="Raw markdown source" title="Ctrl+click a line for git blame"></textarea>
          </div>
          <div id="editor-host" class="editor-host">
            <div id="code-preview" class="code-preview" aria-label="Code read view"></div>
            <div id="editor" class="editor"></div>
          </div>
        </div>

        <div id="findbar" class="findbar" hidden>
          <div class="findbar__row">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="find-input" class="findbar__input" placeholder="Find in document…" />
            <span id="find-count" class="findbar__count">0 / 0</span>
            <button id="find-prev" class="icon-btn icon-btn--sm" title="Previous (Shift+Enter)">
              <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 10-4-4-4 4"/></svg>
            </button>
            <button id="find-next" class="icon-btn icon-btn--sm" title="Next (Enter)">
              <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 4 4 4-4"/></svg>
            </button>
            <button id="find-close" class="icon-btn icon-btn--sm" title="Close (Esc)">
              <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
            </button>
          </div>
          <div class="findbar__row findbar__row--replace" id="findbar-replace" hidden>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v4a2 2 0 0 0 2 2h11"/><path d="m12 9 4-4-4-4"/><path d="M21 17v-4a2 2 0 0 0-2-2H8"/><path d="m12 15-4 4 4 4"/></svg>
            <input id="replace-input" class="findbar__input" placeholder="Replace with…" />
            <button id="replace-one" class="ghost-btn">Replace</button>
            <button id="replace-all" class="ghost-btn">All</button>
          </div>
        </div>
      </main>

      <footer id="statusbar" class="statusbar">
        <div class="statusbar__left">
          <span id="status-path" class="status-item">Untitled</span>
          <span id="status-dirty" class="status-item status-item--dirty" hidden>●</span>
          <button id="status-git" type="button" class="status-item status-item--button status-item--git" title="Git status — click to refresh" hidden>
            <span class="status-git__dot"></span>
            <span id="status-git-label" class="status-git__label"></span>
          </button>
          <span id="status-live" class="status-item status-item--live" title="An external process is writing to this file" hidden>
            <span class="status-live__dot"></span>LIVE
          </span>
          <button id="status-ai" type="button" class="status-item status-item--button status-item--ai" title="AI" hidden>
            <span class="status-ai__dot"></span>
            <span id="status-ai-label" class="status-ai__label">AI</span>
          </button>
        </div>
        <div class="statusbar__right">
          <span id="status-words" class="status-item">0 words</span>
          <span id="status-chars" class="status-item">0 chars</span>
          <span id="status-reading" class="status-item">0 min</span>
          <span id="status-mode" class="status-item">Markdown</span>
          <button id="status-view" type="button" class="status-item status-item--button" title="Toggle view (Ctrl+/)">WYSIWYG</button>
        </div>
      </footer>

      <div id="palette" class="palette" hidden>
        <div class="palette__backdrop"></div>
        <div class="palette__dialog">
          <input id="palette-input" class="palette__input" placeholder="Run command, search files…" />
          <div id="palette-list" class="palette__list"></div>
        </div>
      </div>

      <div id="modal-root" class="modal-root" hidden></div>

      <div id="default-prompt" class="default-prompt" hidden>
        <div class="default-prompt__inner">
          <span class="default-prompt__mark" aria-hidden="true"></span>
          <div class="default-prompt__text">
            <div class="default-prompt__title" id="default-prompt-title">Use TypeX for Markdown files?</div>
            <div class="default-prompt__sub">Windows will ask you to confirm.</div>
          </div>
          <div class="default-prompt__actions">
            <button id="default-prompt-this" class="primary-btn">Set for this type</button>
            <button id="default-prompt-all" class="ghost-btn">Manage all types…</button>
            <button id="default-prompt-later" class="ghost-btn">Not now</button>
            <button id="default-prompt-dismiss" class="icon-btn icon-btn--sm" title="Don't ask again" aria-label="Don't ask again">
              <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast" hidden></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
