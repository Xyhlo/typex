<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.r{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.row{display:flex;gap:18px;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{width:72px;height:52px;background:var(--bg-raised);border:1px solid var(--border-strong)}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle)}
</style></head><body>
<div class="r">Radii</div>
<div class="row">
  <div class="item"><div class="box" style="border-radius:3px"></div><div class="lbl">xs · 3</div></div>
  <div class="item"><div class="box" style="border-radius:5px"></div><div class="lbl">sm · 5</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">lg · 12</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">xl · 16</div></div>
  <div class="item"><div class="box" style="border-radius:999px;width:98px"></div><div class="lbl">pill · 999</div></div>
</div>
</body></html>
