<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.r{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.primary{padding:8px 14px;font-size:13px;font-weight:500;color:#fbfaf6;background:#8b7cff;border:0;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.4), inset 0 0 0 1px #786aec;cursor:pointer;font-family:var(--font-ui)}
.primary:hover{background:#9d90ff}
.secondary{padding:8px 14px;font-size:13px;color:#ebe7dd;background:transparent;border:1.5px solid #1d1c24;border-radius:8px;cursor:pointer;font-family:var(--font-ui)}
.ghost{padding:4px 10px;font-size:12px;color:#a6a1a9;background:transparent;border:0;border-radius:5px;cursor:pointer;font-family:var(--font-ui)}
.ghost:hover{background:#24222c;color:#ebe7dd}
.icon{width:28px;height:28px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#a6a1a9;background:transparent;border:0;cursor:pointer}
.icon:hover{background:#24222c;color:#ebe7dd}
.icon svg{width:16px;height:16px}
</style></head><body>
<div class="r">Buttons — primary · secondary · ghost · icon</div>
<div class="row">
  <button class="primary">Download</button>
  <button class="secondary">Open file…</button>
  <button class="ghost">Cancel</button>
  <button class="icon" title="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
  <button class="icon" title="Theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg></button>
</div>
</body></html>
