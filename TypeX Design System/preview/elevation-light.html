<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.r{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.row{display:flex;gap:22px;align-items:center;padding:8px 4px}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.b{width:90px;height:60px;background:#fff;border-radius:8px;border:1px solid rgba(28,26,32,0.06)}
.xs{box-shadow:0 1px 2px rgba(28,26,32,0.06)}
.sm{box-shadow:0 1px 3px rgba(28,26,32,0.06), 0 4px 10px rgba(28,26,32,0.05)}
.md{box-shadow:0 6px 16px rgba(28,26,32,0.08), 0 2px 6px rgba(28,26,32,0.06)}
.lg{box-shadow:0 18px 48px rgba(28,26,32,0.14), 0 6px 16px rgba(28,26,32,0.08)}
.gl{box-shadow:0 0 0 1px rgba(91,77,224,0.22), 0 10px 30px rgba(91,77,224,0.12)}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle)}
</style></head><body>
<div class="r">Elevation · Light shadow system</div>
<div class="row">
  <div class="item"><div class="b xs"></div><div class="lbl">shadow-xs</div></div>
  <div class="item"><div class="b sm"></div><div class="lbl">shadow-sm</div></div>
  <div class="item"><div class="b md"></div><div class="lbl">shadow-md</div></div>
  <div class="item"><div class="b lg"></div><div class="lbl">shadow-lg</div></div>
  <div class="item"><div class="b gl"></div><div class="lbl">shadow-glow</div></div>
</div>
</body></html>
