<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body{padding:22px 24px;background:#141318}
.r{color:#6f6a76;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.pal{width:520px;background:#2b2934;border:1px solid rgba(255,255,255,0.07);border-radius:12px;box-shadow:0 18px 48px rgba(0,0,0,0.55);overflow:hidden}
.pal input{width:100%;padding:14px 20px;font-size:14px;background:transparent;border:0;border-bottom:1px solid rgba(255,255,255,0.04);color:#ebe7dd;font-family:var(--font-ui);box-sizing:border-box}
.pal input::placeholder{color:#6f6a76}
.list{padding:6px}
.it{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:5px;color:#ebe7dd;font-size:13px}
.it.sel{background:rgba(139,124,255,0.15)}
.it svg{width:16px;height:16px;color:#6f6a76}
.it.sel svg{color:#8b7cff}
.l{flex:1}
.st{font-size:11px;font-family:var(--font-mono);color:#6f6a76}
.st kbd{padding:1px 6px;border:1px solid rgba(255,255,255,0.07);background:#24222c;border-radius:3px;color:#a6a1a9;font-size:11px}
</style></head><body>
<div class="r">Command palette</div>
<div class="pal">
  <input placeholder="Run command, search files…" value="save">
  <div class="list">
    <div class="it sel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      <div class="l">Save file</div><div class="st"><kbd>Ctrl</kbd> <kbd>S</kbd></div>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      <div class="l">Save as…</div><div class="st"><kbd>Ctrl</kbd> <kbd>Shift</kbd> <kbd>S</kbd></div>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
      <div class="l">Save all</div><div class="st"><kbd>Ctrl</kbd> <kbd>Alt</kbd> <kbd>S</kbd></div>
    </div>
  </div>
</div>
</body></html>
