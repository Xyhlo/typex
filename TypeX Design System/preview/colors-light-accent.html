<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.sw{width:96px;height:44px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:center;padding:0 10px;color:#fff}
</style></head><body>
<div class="micro" style="margin-bottom:10px">Ivory Paper · Accent + Semantic</div>
<div class="wrap">
  <div class="sw" style="background:#5b4de0"><div class="mono" style="color:#fff">--accent</div><div class="mono" style="color:rgba(255,255,255,.6)">#5b4de0</div></div>
  <div class="sw" style="background:#2b8a57"><div class="mono" style="color:#fff">--success</div><div class="mono" style="color:rgba(255,255,255,.6)">#2b8a57</div></div>
  <div class="sw" style="background:#a7751f"><div class="mono" style="color:#fff">--warning</div><div class="mono" style="color:rgba(255,255,255,.6)">#a7751f</div></div>
  <div class="sw" style="background:#c63444"><div class="mono" style="color:#fff">--danger</div><div class="mono" style="color:rgba(255,255,255,.6)">#c63444</div></div>
  <div class="sw" style="background:#2e82a6"><div class="mono" style="color:#fff">--info</div><div class="mono" style="color:rgba(255,255,255,.6)">#2e82a6</div></div>
