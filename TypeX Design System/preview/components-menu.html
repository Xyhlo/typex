<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body{padding:20px 24px;background:#141318}
.r{color:#6f6a76;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.menu{min-width:280px;padding:6px;background:#2b2934;border:1px solid rgba(255,255,255,0.07);border-radius:8px;box-shadow:0 18px 48px rgba(0,0,0,0.55), 0 6px 16px rgba(0,0,0,0.4);font-size:12px}
.item{display:flex;align-items:center;gap:12px;padding:7px 10px 7px 28px;border-radius:5px;color:#ebe7dd;position:relative;cursor:default}
.item.sel{background:rgba(139,124,255,0.15)}
.item .check{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8b7cff;display:none}
.item.checked .check{display:block}
.check svg{width:12px;height:12px}
.label{flex:1}
.sc{color:#6f6a76;font-family:var(--font-mono);font-size:11px;margin-left:16px}
.sep{height:1px;margin:4px 6px;background:rgba(255,255,255,0.04)}
.sub::after{content:"▸";color:#6f6a76;font-size:10px;margin-left:8px}
.sl{padding:4px 10px 2px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#6f6a76}
</style></head><body>
<div class="r">Menu — selection · check · shortcut · submenu</div>
<div class="menu">
  <div class="sl">File</div>
  <div class="item"><span class="label">New document</span><span class="sc">Ctrl+N</span></div>
  <div class="item sel"><span class="label">Save as…</span><span class="sc">Ctrl+Shift+S</span></div>
  <div class="item sub"><span class="label">Open recent</span></div>
  <div class="sep"></div>
  <div class="item checked"><span class="check"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 8 3 3 7-7"/></svg></span><span class="label">Focus mode</span><span class="sc">Ctrl+.</span></div>
  <div class="item"><span class="label">Close tab</span><span class="sc">Ctrl+W</span></div>
</div>
</body></html>
