<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>

.row{display:flex;align-items:end;gap:8px;margin-top:8px}
.bar{background:#8b7cff;border-radius:3px}
.lbl{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;text-align:center;margin-top:4px}
.item{display:flex;flex-direction:column;align-items:center}
</style></head><body>

  <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">sp-7<br>32</div></div>
  <div class="item"><div class="bar" style="width:40px;height:40px"></div><div class="lbl">sp-8<br>40</div></div>
  <div class="item"><div class="bar" style="width:56px;height:56px"></div><div class="lbl">sp-9<br>56</div></div>
  <div class="item"><div class="bar" style="width:72px;height:72px"></div><div class="lbl">sp-10<br>72</div></div>
</div>
</body></html>
