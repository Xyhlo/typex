<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.r{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}
.hl{background:linear-gradient(180deg, transparent 62%, rgba(139,124,255,0.25) 62%);padding:0 2px;border-radius:2px}
blockquote{margin:0;padding:10px 16px;border-left:3px solid #8b7cff;background:rgba(139,124,255,0.04);border-radius:0 5px 5px 0;color:#c6c2ca;font-style:italic;font-size:14px}
.k{display:inline-flex;align-items:center;gap:4px}
kbd{font-family:var(--font-mono);font-size:11px;padding:1px 6px;background:var(--bg-overlay);border:1px solid var(--border-strong);border-bottom-width:2px;border-radius:3px;color:var(--fg)}
a{color:var(--accent);text-decoration:none;background-image:linear-gradient(var(--accent),var(--accent));background-size:100% 1px;background-repeat:no-repeat;background-position:0 100%}
</style></head><body>
<div class="grid">
  <div>
    <div class="r">Inline marks</div>
    <div style="font:400 14px/1.7 var(--font-editor);color:var(--fg)">A line with <span class="hl">a mark</span>, an <a href="#">in-text link</a>, inline <code style="font-family:var(--font-mono);font-size:.88em;padding:.15em .42em;background:rgba(139,124,255,0.12);border-radius:3px">code</code>.</div>
  </div>
  <div>
    <div class="r">Keyboard</div>
    <div class="k"><kbd>Ctrl</kbd>+<kbd>K</kbd> &nbsp; <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd></div>
  </div>
  <div style="grid-column:1/-1">
    <div class="r">Quote</div>
    <blockquote>"The best words in the best order." — Coleridge</blockquote>
  </div>
</div>
</body></html>
