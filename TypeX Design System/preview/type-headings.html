<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.r{margin:0 0 10px;color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
h1{font:700 44px/1.1 var(--font-ui);letter-spacing:-0.88px;color:var(--fg-heading);margin:0 0 14px;position:relative}
h1::after{content:"";display:block;margin-top:8px;width:36px;height:2px;border-radius:1px;background:linear-gradient(90deg, var(--accent), transparent)}
h2{font:600 28px/1.2 var(--font-ui);letter-spacing:-0.38px;color:var(--fg-heading);margin:18px 0 8px}
h3{font:600 22px/1.25 var(--font-ui);color:var(--fg-heading);margin:14px 0 4px}
</style></head><body>
<div class="r">Headings · Em-based scale</div>
<h1>The headline reads fast.</h1>
<h2>Section titles stay calm.</h2>
<h3>Subheads for paragraphs.</h3>
</body></html>
