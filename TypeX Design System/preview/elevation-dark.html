<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.r{color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.row{display:flex;gap:22px;align-items:center;padding:8px 4px}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.b{width:90px;height:60px;background:var(--bg-raised);border-radius:8px}
.xs{box-shadow:0 1px 2px rgba(0,0,0,0.4)}
.sm{box-shadow:0 2px 6px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.45)}
.md{box-shadow:0 8px 20px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.35)}
.lg{box-shadow:0 18px 48px rgba(0,0,0,0.55), 0 6px 16px rgba(0,0,0,0.4)}
.gl{box-shadow:0 0 0 1px rgba(139,124,255,0.25), 0 12px 36px rgba(139,124,255,0.12)}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle)}
</style></head><body>
<div class="r">Elevation · Dark shadow system</div>
<div class="row">
  <div class="item"><div class="b xs"></div><div class="lbl">shadow-xs</div></div>
  <div class="item"><div class="b sm"></div><div class="lbl">shadow-sm</div></div>
  <div class="item"><div class="b md"></div><div class="lbl">shadow-md</div></div>
  <div class="item"><div class="b lg"></div><div class="lbl">shadow-lg</div></div>
  <div class="item"><div class="b gl"></div><div class="lbl">shadow-glow</div></div>
</div>
</body></html>
