<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.r{margin:0 0 10px;color:var(--fg-subtle);font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
pre{margin:0;padding:14px 16px;background:var(--code-bg);color:var(--code-fg);border:1px solid var(--code-border);border-radius:8px;font:400 13px/1.6 var(--font-mono);box-shadow:var(--shadow-xs)}
.k{color:var(--hl-keyword)}
.t{color:var(--hl-type)}
.s{color:var(--hl-string)}
.f{color:var(--hl-func)}
.c{color:var(--hl-comment);font-style:italic}
</style></head><body>
<div class="r">Code block · JetBrains Mono · Lowlight tokens</div>
<pre><span class="c">// Painted via ProseMirror decorations, never DOM mutation.</span>
<span class="k">type</span> <span class="t">Mood</span> = <span class="s">"blank"</span> | <span class="s">"flowing"</span> | <span class="s">"done"</span>;

<span class="k">const</span> <span class="f">advance</span> = (m: <span class="t">Mood</span>): <span class="t">Mood</span> =&gt; {
  <span class="k">return</span> <span class="s">"flowing"</span>;
};</pre>
</body></html>
