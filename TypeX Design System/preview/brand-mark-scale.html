<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.scale{display:flex;align-items:flex-end;gap:14px;padding:14px 0}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.m{width:var(--s);height:var(--s);border-radius:calc(var(--s)*0.22);background:radial-gradient(circle at 30% 30%, #9d90ff, #8b7cff 45%, #786aec 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08)}
.lb{font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle)}
</style></head><body>
<div class="scale">
  <div class="item"><div class="m" style="--s:16px"></div><div class="lb">16</div></div>
  <div class="item"><div class="m" style="--s:24px"></div><div class="lb">24</div></div>
  <div class="item"><div class="m" style="--s:32px"></div><div class="lb">32</div></div>
  <div class="item"><div class="m" style="--s:48px"></div><div class="lb">48</div></div>
  <div class="item"><div class="m" style="--s:64px"></div><div class="lb">64</div></div>
  <div class="item"><div class="m" style="--s:96px"></div><div class="lb">96</div></div>
  <div class="item"><div class="m" style="--s:128px"></div><div class="lb">128</div></div>
</div>
<div class="micro" style="margin-top:6px">Rounded square · radial indigo · radius ≈ 22% of side</div>
</body></html>
