<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body{padding:18px 22px;display:flex;align-items:center;gap:22px}
.mark{width:72px;height:72px;border-radius:16px;background:radial-gradient(circle at 30% 30%, #9d90ff, #8b7cff 45%, #786aec 100%);box-shadow:0 0 24px rgba(139,124,255,0.2), inset 0 0 0 1px rgba(255,255,255,.08)}
.word{font-family:var(--font-ui);font-size:52px;font-weight:700;letter-spacing:-1.3px;color:var(--fg-heading);line-height:1}
.tag{color:var(--fg-muted);font-size:13px;margin-top:6px}
.m{color:var(--fg-subtle);font-size:10px;font-family:var(--font-mono);letter-spacing:.12em;text-transform:uppercase;margin-top:8px}
</style></head><body>
<div class="mark"></div>
<div>
  <div class="word">TypeX</div>
  <div class="tag">A Markdown editor that puts typography first.</div>
  <div class="m">v0.1.0 · Windows · MIT · by Amptis</div>
</div>
</body></html>
