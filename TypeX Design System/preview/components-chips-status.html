<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body{padding:20px 24px;background:#141318}
.r{color:#6f6a76;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:3px 12px;border-radius:999px;background:#0d0c10;border:1px solid rgba(255,255,255,0.07);font-family:var(--font-mono);font-size:11px;color:#a6a1a9}
.row{display:flex;gap:10px;align-items:center;margin-top:22px}
.status{display:flex;align-items:center;gap:12px;background:#141318;border-top:1px solid rgba(255,255,255,0.04);padding:0 14px;height:26px;font-size:10px;letter-spacing:.04em;color:#6f6a76;font-family:var(--font-mono)}
.dot{color:#8b7cff}
</style></head><body>
<div class="r">Format chips — Pandoc export targets</div>
<div class="chips">
  <div class="chip">.docx</div><div class="chip">.odt</div><div class="chip">.epub</div>
  <div class="chip">.rtf</div><div class="chip">.tex</div><div class="chip">.rst</div>
  <div class="chip">.adoc</div><div class="chip">.org</div><div class="chip">.html</div>
  <div class="chip">.pdf</div>
</div>
<div class="row"><div class="r" style="margin:0">Statusbar</div></div>
<div class="status" style="margin-top:8px">
  <span>quiet-things.md</span><span class="dot">●</span>
  <span style="margin-left:auto">342 words</span>
  <span>2044 chars</span>
  <span>2 min</span>
  <span>Markdown</span>
</div>
</body></html>
